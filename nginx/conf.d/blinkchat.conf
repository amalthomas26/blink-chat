# ============================================================
# UPSTREAM
# Defines where the backend is. Using the Docker service name
# "backend" (resolves to the backend container's IP on blinkchat_net).
# "keepalive 32" keeps 32 idle connections open to the backend,
# reducing TCP handshake overhead for high-throughput APIs.
# ============================================================
upstream blinkchat_backend {
    server backend:5000;
    keepalive 32;
}

# ============================================================
# HTTP → HTTPS REDIRECT SERVER BLOCK
# Uncomment this in production when TLS is configured.
# For now, comment out if running HTTP only.
# ============================================================
# server {
#     listen 80;
#     listen [::]:80;
#     server_name blinkchat.yourdomain.com;
#
#     # ACME challenge for Let's Encrypt cert renewal
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# ============================================================
# MAIN SERVER BLOCK
# Change "listen 80" to "listen 443 ssl" when adding TLS.
# ============================================================
server {
    listen 80;
    listen [::]:80;

    # Replace with your actual domain in production
    server_name _;

    # --------------------------------------------------------
    # TLS CONFIGURATION (uncomment for production HTTPS)
    # --------------------------------------------------------
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # http2 on;
    #
    # ssl_certificate     /etc/letsencrypt/live/blinkchat.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/blinkchat.yourdomain.com/privkey.pem;
    #
    # # Modern TLS settings (Mozilla Intermediate)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # --------------------------------------------------------
    # SECURITY HEADERS
    # --------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Adjust CSP to match your actual sources (Cloudinary, Google OAuth, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://lh3.googleusercontent.com; connect-src 'self' wss: https://res.cloudinary.com; media-src 'self' blob: https://res.cloudinary.com; frame-src https://accounts.google.com;" always;
    # Uncomment after confirming HTTPS is fully working:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --------------------------------------------------------
    # NGINX INTERNAL HEALTH ENDPOINT
    # Used by Docker healthcheck. Not proxied to backend.
    # --------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # --------------------------------------------------------
    # SOCKET.IO REALTIME PATH
    # This must come BEFORE the /api block.
    # Socket.IO uses BOTH WebSocket and HTTP long-polling.
    # We must handle both transports correctly here.
    #
    # Key settings explained:
    #   proxy_http_version 1.1   — WebSocket requires HTTP/1.1
    #   Upgrade / Connection     — required for WS handshake
    #   proxy_buffering off      — realtime: no buffering
    #   proxy_read_timeout 3600s — keep WS connections alive
    #     (much longer than Socket.IO's default 20s ping timeout)
    # --------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://blinkchat_backend;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client information to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for Socket.IO: disable response buffering.
        # Without this, long-poll responses get stuck in Nginx's buffer.
        proxy_buffering off;
        proxy_cache off;

        # Timeouts — must be longer than Socket.IO heartbeat cycle.
        # Socket.IO default: pingInterval=25000ms + pingTimeout=20000ms = 45s max.
        # We use 3600s (1 hour) to support long-lived connections.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # --------------------------------------------------------
    # API PATH
    # All REST API requests go to the backend.
    # Buffering is ON here (fine for REST — not realtime).
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://blinkchat_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";      # Enable HTTP keepalive to upstream

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for REST API calls
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Allow large file uploads (matches client_max_body_size)
        client_max_body_size 15M;

        # Buffering is fine for REST — improves throughput
        proxy_buffering on;
    }

    # --------------------------------------------------------
    # FRONTEND STATIC ASSETS
    # The Vite build output has hashed filenames (e.g., index-Bx3k.js).
    # We can cache them aggressively — the hash changes on every rebuild,
    # so cache invalidation is automatic.
    # --------------------------------------------------------
    location /assets/ {
        root /usr/share/nginx/html;

        # Cache for 1 year — safe because Vite hashes all asset filenames
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Serve the file directly (no proxy)
        try_files $uri =404;
    }

    # --------------------------------------------------------
    # INDEX.HTML CACHE CONTROL
    # Must stay fresh so deployments load the latest asset hashes.
    # --------------------------------------------------------
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # --------------------------------------------------------
    # SPA FALLBACK — THE MOST IMPORTANT RULE FOR REACT ROUTER
    #
    # React Router v7 uses client-side routing.
    # /chat/abc123 does not exist as a file on disk.
    # When the user refreshes or bookmarks that URL, Nginx
    # looks for /usr/share/nginx/html/chat/abc123 — not found.
    #
    # try_files $uri $uri/ /index.html:
    #   1. Try to serve $uri as a file (e.g., /assets/main.js — found, serve it)
    #   2. Try to serve $uri as a directory index (usually not applicable)
    #   3. Fall back to /index.html — React Router then handles the route
    # --------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
