# Number of worker processes. "auto" = one per CPU core.
worker_processes auto;

# Error log — goes to stdout/stderr so Docker captures it.
error_log /dev/stderr warn;

# PID file location
pid /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker.
    worker_connections 1024;
}

http {
    # MIME types (image/png, text/css, etc.)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format — structured for easy parsing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Access log — stdout for Docker
    access_log /dev/stdout main;

    # Static file tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep-alive for chat + API traffic
    keepalive_timeout 30s;

    # MIME types hash
    types_hash_max_size 2048;

    # Hide Nginx version
    server_tokens off;

    # Client upload size
    client_max_body_size 15M;

    # Proxy tuning
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # --------------------------------------------------------
    # GZIP COMPRESSION
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        application/vnd.ms-fontobject
        image/svg+xml
        font/woff
        font/woff2;

    # --------------------------------------------------------
    # BROTLI COMPRESSION
    # Requires nginx to be built/loaded with ngx_brotli.
    # Used for text/static assets; media already-compressed
    # formats (jpg, png, webp, mp4, mp3, etc.) are left alone.
    # --------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_static on;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     text/javascript
    #     application/javascript
    #     application/json
    #     application/xml
    #     application/rss+xml
    #     application/manifest+json
    #     application/vnd.ms-fontobject
    #     image/svg+xml
    #     font/woff
    #     font/woff2;

    # Include all virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
