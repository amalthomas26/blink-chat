# Modern Docker Compose syntax (no version key needed in Compose v2+)
# Run with: docker compose up -d
# Requires: docker compose plugin (not docker-compose legacy)

name: blinkchat

networks:
  blinkchat_net:
    driver: bridge

volumes:
  frontend_assets:

services:
  frontend-build:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: export
    container_name: blinkchat-frontend-build
    volumes:
      - frontend_assets:/frontend
    command: >
      sh -c "cp -r /static/. /frontend/"
    restart: "no"
    networks:
      - blinkchat_net

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blinkchat-backend
    restart: unless-stopped
    networks:
      - blinkchat_net
    expose:
      - "5000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    stop_grace_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: blinkchat-nginx
    restart: unless-stopped
    networks:
      - blinkchat_net
    ports:
      - "8080:80"
    volumes:
      - frontend_assets:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend-build
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 10s
